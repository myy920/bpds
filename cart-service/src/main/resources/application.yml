server:
  port: 8002
  servlet:
    context-path: /${spring.application.name}
spring:
  application:
    name: cart-service

  profiles:
    active: dev

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://192.168.11.130:3306/bpds?serverTimezone=Asia/Shanghai&characterEncoding=utf-8&allowMultiQueries=true
    username: root
    password: Root*123

    # HikariCP 连接池配置
    hikari:
      # 最小空闲连接数
      minimum-idle: 5
      # 最大连接池大小
      maximum-pool-size: 20
      # 连接超时时间（毫秒）
      connection-timeout: 30000
      # 空闲连接最大存活时间（毫秒）
      idle-timeout: 600000
      # 连接最大生命周期（毫秒）
      max-lifetime: 1800000
      # 连接测试查询
      connection-test-query: SELECT 1
      # 连接池名称
      pool-name: BPDS_DB_POOL
      # 自动提交
      auto-commit: true
      # 泄漏检测阈值（毫秒），0表示禁用
      leak-detection-threshold: 60000

  data:
    redis:
      host: 192.168.11.130
      port: 6379
      password: Root*123
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          enabled: true
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: -1ms
        shutdown-timeout: 100ms

  cache:
    redis:
      key-prefix:
        ${spring.application.name}:${spring.profiles.active}

  cloud:
    nacos:
      server-addr: 192.168.11.130:8848
      username: nacos
      password: nacos
      discovery:
        namespace: ""
        group: DEFAULT_GROUP
    sentinel:
      transport:
        dashboard: 192.168.11.130:8858
      http-method-specify: true

seata:
  enable: true
  enable-auto-data-source-proxy: true
  registry:
    type: nacos
    nacos:
      server-addr: ${spring.cloud.nacos.server-addr}
      username: ${spring.cloud.nacos.username}
      password: ${spring.cloud.nacos.password}
      namespace: ${spring.cloud.nacos.discovery.namespace}
      group: ${spring.cloud.nacos.discovery.group}
  tx-service-group: bpds
  service:
    vgroup-mapping:
      bpds: "default"
  data-source-proxy-mode: AT


# MyBatis-Plus 配置
mybatis-plus:
  # Mapper XML 文件位置
  mapper-locations: classpath:dao/**/*.xml
  # 实体类扫描路径
  type-aliases-package: com.myy.bpds.cartservice.entity
  configuration:
    # 驼峰命名转换
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      # 主键策略：ASSIGN_ID 使用雪花算法
      id-type: ASSIGN_ID

feign:
  okhttp:
    enabled: true
  sentinel:
    enabled: true
  client:
    config:
      default:
        connectTimeout: 5000      # 连接超时（毫秒）
        readTimeout: 10000          # 读取超时（毫秒）
        followRedirects: true       # 是否跟随重定向


logging:
  level:
    com.myy.bpds: debug

