server:
  port: 8004
  servlet:
    context-path: /${spring.application.name}

spring:
  application:
    name: user-service

  profiles:
    active: dev

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://192.168.11.130:3306/bpds?serverTimezone=Asia/Shanghai&characterEncoding=utf-8&allowMultiQueries=true
    username: root
    password: Root*123

    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1
      pool-name: BPDS_USER_POOL
      auto-commit: true
      leak-detection-threshold: 60000

  cloud:
    nacos:
      server-addr: 192.168.11.130:8848
      username: nacos
      password: nacos
      discovery:
        namespace: ""
        group: DEFAULT_GROUP
    sentinel:
      enabled: false
      transport:
        dashboard: 192.168.11.130:8858
      http-method-specify: true

seata:
  enabled: false
  enable-auto-data-source-proxy: true
  registry:
    type: nacos
    nacos:
      server-addr: ${spring.cloud.nacos.server-addr}
      username: ${spring.cloud.nacos.username}
      password: ${spring.cloud.nacos.password}
      namespace: ${spring.cloud.nacos.discovery.namespace}
      group: ${spring.cloud.nacos.discovery.group}
  tx-service-group: bpds
  service:
    vgroup-mapping:
      bpds: "default"
  data-source-proxy-mode: AT

# MyBatis-Plus 配置
mybatis-plus:
  # Mapper XML 文件位置
  mapper-locations: classpath:dao/**/*.xml
  # 实体类扫描路径
  type-aliases-package: com.myy.bpds.userservice.entity
  configuration:
    # 驼峰命名转换
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      # 主键策略：ASSIGN_ID 使用雪花算法
      id-type: ASSIGN_ID

feign:
  okhttp:
    enabled: true
  client:
    config:
      default:
        connectTimeout: 5000      # 连接超时（毫秒）
        readTimeout: 10000          # 读取超时（毫秒）
        followRedirects: true       # 是否跟随重定向

logging:
  level:
    com.myy.bpds: debug
